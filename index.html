<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satoshi Egg - Bitcoin Virtual Pet</title>
  <style>
    :root {
      --bg-color: #0b0c10;
      --panel-bg: rgba(31, 40, 51, 0.6);
      --primary: #66fcf1;
      --secondary: #45a29e;
      --accent: #f7931a; /* Bitcoin Orange */
      --danger: #ff4e50;
      --text: #c5c6c7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      background: radial-gradient(circle at center, #1f2833 0%, #0b0c10 100%);
      color: var(--text);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      overflow-x: hidden;
    }
    
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');
    .crypto-font { font-family: 'Orbitron', sans-serif; }
    
    header {
      width: 100%; text-align: center; padding: 20px 0;
      border-bottom: 1px solid rgba(102, 252, 241, 0.2);
      background: rgba(11, 12, 16, 0.8);
      backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 10;
    }
    h1 {
      margin: 0; color: var(--accent); font-size: 2rem;
      text-shadow: 0 0 15px rgba(247, 147, 26, 0.6);
    }
    #mempool-status { font-size: 0.9rem; color: var(--primary); margin-top: 5px; font-weight: bold; }
    
    main { width: 100%; max-width: 450px; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
    
    .glass-panel {
      background: var(--panel-bg); backdrop-filter: blur(12px);
      border: 1px solid rgba(102, 252, 241, 0.1);
      border-radius: 20px; padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    
    /* ステータスバー */
    .hp-container {
      width: 100%; height: 15px; background: rgba(0,0,0,0.5);
      border-radius: 10px; overflow: hidden; margin-bottom: 15px;
      border: 1px solid rgba(255,255,255,0.1);
      position: relative;
    }
    #hp-bar {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #ff4e50, #f7931a, #66fcf1);
      transition: width 0.5s ease;
    }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-box {
      background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; text-align: center;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .stat-label { font-size: 0.8rem; color: #888; }
    .stat-value { font-size: 1.1rem; color: var(--primary); font-weight: bold; margin-top: 5px; }

    /* キャラクター表示エリア */
    #character-container {
      height: 280px; display: flex; justify-content: center; align-items: center;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(102,252,241,0.08) 0%, transparent 60%);
      box-shadow: inset 0 0 50px rgba(102, 252, 241, 0.05);
      position: relative;
    }
    .character-svg { width: 180px; height: 180px; filter: drop-shadow(0 0 15px rgba(247,147,26,0.4)); }
    
    /* アニメーション */
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-15px); }
      100% { transform: translateY(0px); }
    }
    @keyframes pulse {
      0% { transform: scale(1); filter: drop-shadow(0 0 10px var(--accent)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 0 25px var(--accent)); }
      100% { transform: scale(1); filter: drop-shadow(0 0 10px var(--accent)); }
    }
    .anim-float { animation: float 4s ease-in-out infinite; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }

    /* ボタン */
    button {
      background: transparent; border: 2px solid var(--primary); color: var(--primary);
      padding: 15px 20px; border-radius: 12px; font-size: 1rem; cursor: pointer;
      font-family: 'Orbitron', sans-serif; font-weight: bold; transition: all 0.3s;
      width: 100%; margin-bottom: 10px;
    }
    button:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); }
    button.btn-accent { border-color: var(--accent); color: var(--accent); }
    button.btn-accent:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }

    /* 称号バッジ */
    #titles-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 15px; justify-content: center; }
    .badge {
      background: linear-gradient(45deg, #ffd700, #f7931a); color: #000;
      padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold;
      box-shadow: 0 2px 10px rgba(247, 147, 26, 0.4);
    }

    /* モーダル */
    #modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
      display: none; justify-content: center; align-items: center; z-index: 100;
    }
    .modal-content {
      background: var(--bg-color); border: 1px solid var(--primary);
      width: 90%; max-width: 400px; padding: 25px; border-radius: 20px;
      box-shadow: 0 0 40px rgba(102, 252, 241, 0.2);
    }
    .modal-content h2 { margin-top: 0; color: var(--accent); text-align: center; }
    .input-group { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 10px; margin-bottom: 15px; }
    .input-group input {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid var(--secondary);
      background: rgba(0,0,0,0.5); color: #fff; font-family: monospace; margin-top: 8px;
    }
    .close-btn { background: var(--danger); border-color: var(--danger); color: #fff; margin-top: 20px; }
    .close-btn:hover { background: transparent; color: var(--danger); }

    /* トースト通知 */
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: var(--primary); color: #000; padding: 12px 25px;
      border-radius: 30px; font-weight: bold; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; z-index: 200; box-shadow: 0 5px 15px rgba(102, 252, 241, 0.5);
    }
  </style>
</head>
<body>

  <header>
    <h1>Satoshi Egg</h1>
    <div id="mempool-status">Mempool Connecting...</div>
  </header>
  
  <main>
    <div class="glass-panel">
      <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
        <span class="stat-label">Health Points</span>
        <span class="stat-label" id="hp-text">100 / 100</span>
      </div>
      <div class="hp-container"><div id="hp-bar"></div></div>
      
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-label">経過ブロック (年齢)</div>
          <div class="stat-value crypto-font" id="age-text">0</div>
        </div>
        <div class="stat-box">
          <div class="stat-label">現在のすがた</div>
          <div class="stat-value" id="stage-text">🥚 卵</div>
        </div>
      </div>

      <div id="titles-container"></div>
    </div>

    <div id="character-container">
      <div id="character-display"></div>
    </div>

    <div class="actions" id="action-buttons">
      <button onclick="feedPet()" class="btn-accent">🍖 Tx手数料を与える (HP回復)</button>
      <button onclick="openEvoModal()">🌟 特別進化の儀式</button>
    </div>
  </main>

  <!-- 特別進化モーダル -->
  <div id="modal-overlay">
    <div class="modal-content">
      <h2>🌟 特別進化の儀式</h2>
      <p style="font-size:0.85rem; color:#aaa; text-align:center;">伝説の姿になるための試練です。<br>(成体まで育っている必要があります)</p>
      
      <div class="input-group">
        <label style="color:var(--primary); font-weight:bold;">🎮 ゲームヒーロー形態</label>
        <p style="font-size:0.75rem; margin:5px 0 0 0; color:#888;">BITPUYO トップ3の証明コード<br>(※デモ用コード: <code>BITPUYO2026</code>)</p>
        <input type="text" id="hero-code" placeholder="コードを入力">
        <button onclick="checkEvoHero()" style="margin-top:10px; padding:8px;">進化する</button>
      </div>

      <div class="input-group">
        <label style="color:var(--accent); font-weight:bold;">🔥 富豪形態</label>
        <p style="font-size:0.75rem; margin:5px 0 0 0; color:#888;">あなたのアドレスへの着金を監視します</p>
        <input type="text" id="rich-address" placeholder="bc1q...">
        <button onclick="checkEvoRich()" style="margin-top:10px; padding:8px; border-color:var(--accent); color:var(--accent);">APIで着金確認</button>
      </div>
      
      <button onclick="closeEvoModal()" class="close-btn">閉じる</button>
    </div>
  </div>

  <div id="toast">メッセージ</div>

  <script>
    // --- キャラクターSVG定義 (CSSアート) ---
    const SVGS = {
      egg: `<svg class="character-svg anim-pulse" viewBox="0 0 100 100">
              <defs><linearGradient id="eggGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffd700" /><stop offset="100%" stop-color="#f7931a" /></linearGradient></defs>
              <rect x="25" y="25" width="50" height="50" rx="15" fill="url(#eggGrad)" />
              <text x="50" y="58" font-family="Orbitron" font-size="28" fill="#fff" text-anchor="middle" font-weight="bold">B</text>
            </svg>`,
      baby: `<svg class="character-svg anim-float" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="30" fill="#f7931a" />
              <circle cx="40" cy="45" r="6" fill="#fff" /><circle cx="60" cy="45" r="6" fill="#fff" />
              <circle cx="40" cy="45" r="3" fill="#000" /><circle cx="60" cy="45" r="3" fill="#000" />
              <path d="M45,60 Q50,65 55,60" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
              <line x1="20" y1="50" x2="10" y2="40" stroke="#f7931a" stroke-width="4" stroke-linecap="round"/>
              <line x1="80" y1="50" x2="90" y2="40" stroke="#f7931a" stroke-width="4" stroke-linecap="round"/>
            </svg>`,
      kid: `<svg class="character-svg anim-float" viewBox="0 0 100 100">
              <polygon points="50,15 85,35 85,75 50,95 15,75 15,35" fill="#45a29e" stroke="#66fcf1" stroke-width="2"/>
              <circle cx="35" cy="45" r="5" fill="#1f2833" /><circle cx="65" cy="45" r="5" fill="#1f2833" />
              <rect x="40" y="65" width="20" height="4" fill="#1f2833" />
              <path d="M15,35 L30,50 M85,35 L70,50 M15,75 L30,60 M85,75 L70,60" stroke="#66fcf1" stroke-width="2"/>
            </svg>`,
      teen: `<svg class="character-svg anim-float" viewBox="0 0 100 100">
              <path d="M50,5 L95,50 L50,95 L5,50 Z" fill="#1f2833" stroke="#f7931a" stroke-width="4"/>
              <polyline points="25,50 40,35 60,65 75,50" fill="none" stroke="#66fcf1" stroke-width="4" />
              <circle cx="50" cy="50" r="12" fill="#f7931a" />
            </svg>`,
      adult: `<svg class="character-svg anim-float" viewBox="0 0 100 100">
               <rect x="20" y="20" width="60" height="60" rx="5" fill="#0b0c10" stroke="#66fcf1" stroke-width="4"/>
               <rect x="30" y="35" width="40" height="8" fill="#45a29e" />
               <rect x="30" y="55" width="40" height="8" fill="#45a29e" />
               <circle cx="40" cy="39" r="3" fill="#66fcf1" class="anim-pulse"/>
               <circle cx="40" cy="59" r="3" fill="#f7931a" class="anim-pulse"/>
               <text x="50" y="15" font-family="Orbitron" font-size="12" fill="#f7931a" text-anchor="middle">FULL NODE</text>
             </svg>`,
      hero: `<svg class="character-svg anim-float" viewBox="0 0 100 100">
              <rect x="30" y="30" width="40" height="40" fill="#ff4e50" />
              <polygon points="30,30 35,10 50,20 65,10 70,30" fill="#ffd700" />
              <rect x="75" y="20" width="6" height="50" fill="#c5c6c7" />
              <rect x="70" y="65" width="16" height="6" fill="#f7931a" />
              <rect x="40" y="45" width="6" height="6" fill="#fff" />
              <rect x="54" y="45" width="6" height="6" fill="#fff" />
            </svg>`,
      rich: `<svg class="character-svg anim-float" viewBox="0 0 100 100">
              <path d="M10,60 C10,30 40,20 60,30 C80,40 90,20 90,20 C90,60 70,80 50,80 C30,80 10,70 10,60 Z" fill="#f7931a" />
              <path d="M40,20 L45,5 L50,15 L55,5 L60,20 Z" fill="#ffd700" />
              <circle cx="30" cy="45" r="5" fill="#1f2833" /><circle cx="32" cy="43" r="2" fill="#fff" />
              <path d="M15,65 Q30,75 45,65" fill="none" stroke="#1f2833" stroke-width="3"/>
            </svg>`,
      dead: `<div style="font-size: 6rem; animation: float 4s ease-in-out infinite;">🪦</div>`
    };

    // --- ゲーム設定と状態 ---
    const STAGES = [
      { id: 'egg', name: '🥚 Genesis Egg', maxAge: 11 },
      { id: 'baby', name: '🐣 Satoshi Baby', maxAge: 71 },
      { id: 'kid', name: '🐥 Byte Kid', maxAge: 215 },
      { id: 'teen', name: '🐦 Hash Teen', maxAge: 431 },
      { id: 'adult', name: '👑 Node Master (成体)', maxAge: 719 }
    ];

    const LEGENDS = {
      'hero': { id: 'hero', name: '⚡ Arcade Satoshi (伝説)' },
      'rich': { id: 'rich', name: '🔥 Whale Leviathan (伝説)' }
    };

    const MAX_LIFETIME = 1008; // 7日間(約1008ブロック)で老衰

    let appState = {
      birthHeight: 0,
      hp: 100,
      lastAccess: Date.now(),
      specialEvo: null,
      titles: [],
      isDead: false,
      deathReason: ""
    };

    // --- コアロジック ---
    function loadData() {
      const data = localStorage.getItem('satoshi_egg_save');
      if (data) appState = JSON.parse(data);
    }
    
    function saveData() {
      localStorage.setItem('satoshi_egg_save', JSON.stringify(appState));
    }

    async function getApiData() {
      try {
        const [tipRes, feeRes] = await Promise.all([
          fetch('https://mempool.space/api/blocks/tip/height'),
          fetch('https://mempool.space/api/v1/fees/recommended')
        ]);
        return { height: parseInt(await tipRes.text()), fees: await feeRes.json() };
      } catch (e) {
        showToast("⚠️ API通信エラー");
        return null;
      }
    }

    async function updateGame() {
      if (appState.isDead) return renderDead();

      const apiData = await getApiData();
      if (!apiData) return;

      const tipHeight = apiData.height;
      const fees = apiData.fees;
      
      document.getElementById('mempool-status').innerText = `🌍 Block: ${tipHeight} | 🚀 FastFee: ${fees.fastestFee} sat/vB`;

      if (!appState.birthHeight) {
        appState.birthHeight = tipHeight;
        appState.lastAccess = Date.now();
        saveData();
      }

      const age = tipHeight - appState.birthHeight;
      const now = Date.now();
      const msPassed = now - appState.lastAccess;
      
      // HPダメージ計算
      // 放置ダメージ: 24時間(86,400,000ms)で50HP減少
      let damage = (msPassed / 86400000) * 50;
      
      // 激混雑ペナルティ: Feeが100sat/vB以上なら、1時間で20HP減るペースを加算
      if (fees.fastestFee >= 100) {
         damage += (msPassed / 3600000) * 20;
      }

      appState.hp -= damage;
      appState.lastAccess = now;

      // 死亡判定
      if (appState.hp <= 0) {
        appState.hp = 0;
        die("💀 餓死または高Feeストレス死");
        return;
      }
      if (age >= MAX_LIFETIME) {
        die("👼 老衰 (天寿を全うしました)");
        return;
      }

      saveData();
      renderStage(age);
      renderStats(age);
    }

    function renderStage(age) {
      let currentStage = STAGES[STAGES.length - 1];
      
      if (age >= 720) {
        if (appState.specialEvo) {
          currentStage = LEGENDS[appState.specialEvo];
        }
      } else {
        for (let s of STAGES) {
          if (age <= s.maxAge) {
            currentStage = s; break;
          }
        }
      }

      document.getElementById('stage-text').innerText = currentStage.name;
      document.getElementById('character-display').innerHTML = SVGS[currentStage.id];
    }

    function renderStats(age) {
      document.getElementById('age-text').innerText = age;
      document.getElementById('hp-text').innerText = `${Math.floor(appState.hp)} / 100`;
      document.getElementById('hp-bar').style.width = `${Math.max(0, appState.hp)}%`;

      const tc = document.getElementById('titles-container');
      tc.innerHTML = '';
      appState.titles.forEach(t => {
        let span = document.createElement('span');
        span.className = 'badge'; span.innerText = t; tc.appendChild(span);
      });
    }

    function die(reason) {
      appState.isDead = true;
      appState.deathReason = reason;
      if (appState.specialEvo) {
        // 伝説で死んだ場合のみ、称号が残る
        appState.titles.push(`前世: ${LEGENDS[appState.specialEvo].name}`);
      }
      saveData();
      renderDead();
    }

    function renderDead() {
      document.getElementById('stage-text').innerText = appState.deathReason;
      document.getElementById('character-display').innerHTML = SVGS['dead'];
      document.getElementById('hp-bar').style.width = `0%`;
      document.getElementById('action-buttons').innerHTML = `<button onclick="reincarnate()" class="btn-accent">♻️ 転生する (卵からやり直し)</button>`;
    }

    function reincarnate() {
      appState.birthHeight = 0;
      appState.hp = 100;
      appState.isDead = false;
      appState.specialEvo = null;
      appState.deathReason = "";
      saveData();
      location.reload();
    }

    // --- UI アクション ---
    function feedPet() {
      if(appState.isDead) return;
      appState.hp = Math.min(100, appState.hp + 15);
      appState.lastAccess = Date.now(); // エサやりでアクセス時間リセット
      showToast("🍖 トランザクションFeeを食べてHPが回復した！");
      saveData();
      renderStats(document.getElementById('age-text').innerText);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg; t.style.opacity = 1;
      setTimeout(() => t.style.opacity = 0, 3000);
    }

    // --- 特別進化 ---
    function openEvoModal() {
      const age = parseInt(document.getElementById('age-text').innerText);
      if(age < 432) {
        showToast("⚠️ まだ成体(Node Master)に達していません！");
        return;
      }
      if(appState.specialEvo) {
        showToast("⚠️ 既に伝説に進化済みです！");
        return;
      }
      document.getElementById('modal-overlay').style.display = 'flex';
    }
    
    function closeEvoModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    function checkEvoHero() {
      const code = document.getElementById('hero-code').value;
      if(code === 'BITPUYO2026') {
        evolveSpecial('hero');
      } else {
        showToast("❌ コードが違います");
      }
    }

    async function checkEvoRich() {
      const addr = document.getElementById('rich-address').value;
      if (!addr) return;
      try {
        const res = await fetch(`https://mempool.space/api/address/${addr}/txs`);
        const txs = await res.json();
        // 簡易チェック: 履歴が1件でもあれば進化（本格運用の場合は block_height と birthHeight を比較）
        if(txs && txs.length > 0) {
          evolveSpecial('rich');
        } else {
          showToast("❌ アドレスに着金履歴がありません");
        }
      } catch(e) {
        showToast("❌ API通信エラー");
      }
    }

    function evolveSpecial(type) {
      // 一気に進化年齢(720)までスキップさせる
      appState.specialEvo = type;
      appState.birthHeight -= 720; // 内部的な年齢を強制的に引き上げる
      saveData();
      closeEvoModal();
      showToast("🌟 まばゆい光に包まれた…！特別進化成功！");
      updateGame();
    }

    // --- 初期化 ---
    window.onload = () => {
      loadData();
      updateGame();
      // 1分ごとにステータスを自動更新
      setInterval(updateGame, 60000);
    };
  </script>
</body>
</html>
