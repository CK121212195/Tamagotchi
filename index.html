<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Satoshi Egg - Bitcoin Virtual Pet</title>
  <style>
    :root {
      --bg-color: #0b0c10; --panel-bg: rgba(31, 40, 51, 0.6);
      --primary: #66fcf1; --secondary: #45a29e;
      --accent: #f7931a; --danger: #ff4e50;
      --text: #c5c6c7;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0; background: radial-gradient(circle at center, #1f2833 0%, #0b0c10 100%);
      color: var(--text); font-family: 'Segoe UI', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden;
      user-select: none;
    }
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');
    .crypto-font { font-family: 'Orbitron', sans-serif; }
    
    header {
      width: 100%; text-align: center; padding: 15px 0; border-bottom: 1px solid rgba(102, 252, 241, 0.2);
      background: rgba(11, 12, 16, 0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 10;
    }
    h1 { margin: 0; color: var(--accent); font-size: 1.8rem; text-shadow: 0 0 15px rgba(247, 147, 26, 0.6); }
    #mempool-status { font-size: 0.8rem; color: var(--primary); margin-top: 5px; }

    main { width: 100%; max-width: 450px; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
    
    .glass-panel {
      background: var(--panel-bg); backdrop-filter: blur(12px); border: 1px solid rgba(102, 252, 241, 0.1);
      border-radius: 20px; padding: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    
    .bar-wrapper { margin-bottom: 10px; }
    .bar-label-row { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 3px; }
    .bar-bg { width: 100%; height: 12px; background: rgba(0,0,0,0.6); border-radius: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
    .bar-fill { height: 100%; transition: width 0.3s ease; }
    #hp-bar { background: linear-gradient(90deg, var(--danger), var(--accent)); }
    #mood-bar { background: linear-gradient(90deg, #ff9a9e, #fecfef); }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px;}
    .stat-box { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
    .stat-label { font-size: 0.75rem; color: #888; }
    .stat-value { font-size: 1rem; color: var(--primary); font-weight: bold; margin-top: 3px; }

    /* キャラクターエリア (画像向けに調整) */
    #character-container {
      height: 280px; display: flex; justify-content: center; align-items: center; border-radius: 20px;
      background: radial-gradient(circle, rgba(102,252,241,0.08) 0%, rgba(0,0,0,0.5) 100%);
      box-shadow: inset 0 0 30px rgba(102, 252, 241, 0.05); border: 2px solid rgba(102,252,241,0.2);
      position: relative; overflow: hidden;
    }
    
    /* 画像用スタイル（PNG画像の美しさを引き立てるドロップシャドウ） */
    .character-img {
      max-width: 180px; max-height: 180px; 
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.8)) drop-shadow(0 0 15px rgba(247,147,26,0.3));
      transition: transform 0.2s;
    }
    
    .sick-icon { position: absolute; top: 10px; right: 20px; font-size: 2.5rem; animation: blink 1s infinite; display: none; filter: drop-shadow(0 0 10px red); }
    .junk-icon { position: absolute; font-size: 1.5rem; animation: float 3s infinite; }
    
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
    @keyframes pulse { 0% { transform: scale(1); filter: drop-shadow(0 0 10px var(--accent)); } 50% { transform: scale(1.05); filter: drop-shadow(0 0 25px var(--accent)); } 100% { transform: scale(1); filter: drop-shadow(0 0 10px var(--accent)); } }
    @keyframes jump { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.1); } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    @keyframes pop { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(1.5) translateY(-50px); opacity: 0; } }
    
    .anim-float { animation: float 4s ease-in-out infinite; }
    .anim-pulse { animation: pulse 2s ease-in-out infinite; }
    .anim-jump { animation: jump 0.5s ease; }

    .particle { position: absolute; font-size: 1.5rem; font-weight: bold; pointer-events: none; animation: pop 1s ease-out forwards; z-index: 50; }

    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    button { background: rgba(0,0,0,0.5); border: 1px solid var(--primary); color: var(--primary); padding: 12px; border-radius: 12px; font-size: 0.9rem; cursor: pointer; font-family: 'Orbitron', sans-serif; font-weight: bold; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; }
    button:hover, button:active { background: var(--primary); color: #000; box-shadow: 0 0 15px var(--primary); transform: scale(0.95); }
    button.btn-feed { border-color: var(--accent); color: var(--accent); }
    button.btn-feed:hover { background: var(--accent); color: #000; box-shadow: 0 0 15px var(--accent); }
    button.btn-play { border-color: #ff9a9e; color: #ff9a9e; }
    button.btn-play:hover { background: #ff9a9e; color: #000; box-shadow: 0 0 15px #ff9a9e; }
    button.btn-clean { border-color: #c5c6c7; color: #c5c6c7; }
    button.btn-clean:hover { background: #c5c6c7; color: #000; }
    button.btn-cure { border-color: #00f5d4; color: #00f5d4; }
    button.btn-cure:hover { background: #00f5d4; color: #000; box-shadow: 0 0 15px #00f5d4; }
    button.btn-full { grid-column: span 2; border-color: #ffd700; color: #ffd700; padding: 15px; }

    .debug-panel { border: 1px dashed #666; padding: 10px; border-radius: 12px; background: rgba(0,0,0,0.4); display: flex; justify-content: space-between;}
    .debug-panel button { padding: 8px; font-size: 0.8rem; margin:0; width: 48%; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 100; }
    .modal-content { background: var(--bg-color); border: 1px solid var(--primary); width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; padding: 20px; border-radius: 20px; text-align: center; }
    .input-group { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 10px; text-align: left; }
    .input-group input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--secondary); background: #000; color: #fff; margin-top: 5px; }
    #ritual-box { display: none; margin-top: 15px; padding: 20px; background: #000; border: 2px solid #ff4e50; border-radius: 10px; }
    #ritual-bar { height: 10px; background: #ff4e50; width: 0%; transition: width 0.1s; }
    #toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 10px 20px; border-radius: 20px; font-weight: bold; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 200; }
  </style>
</head>
<body>

  <header>
    <h1>Satoshi Egg</h1>
    <div id="mempool-status">Connecting...</div>
  </header>
  
  <main>
    <div class="glass-panel">
      <div class="bar-wrapper"><div class="bar-label-row"><span>HP (エサ)</span><span id="hp-text">100/100</span></div><div class="bar-bg"><div id="hp-bar" class="bar-fill"></div></div></div>
      <div class="bar-wrapper"><div class="bar-label-row"><span style="color:#ff9a9e;">ごきげん (遊ぶ)</span><span id="mood-text">100/100</span></div><div class="bar-bg"><div id="mood-bar" class="bar-fill"></div></div></div>
      <div class="stats-grid">
        <div class="stat-box"><div class="stat-label">経過ブロック(年齢)</div><div class="stat-value crypto-font" id="age-text">0</div></div>
        <div class="stat-box"><div class="stat-label">放置時間</div><div class="stat-value crypto-font" id="idle-time">00:00:00</div></div>
        <div class="stat-box" style="grid-column: span 2;"><div class="stat-label">現在のすがた</div><div class="stat-value" id="stage-text">🥚 卵</div></div>
      </div>
    </div>

    <!-- ここに画像が表示されます -->
    <div id="character-container">
      <div id="sick-indicator" class="sick-icon">💀</div>
      <div id="junks-container"></div>
      <div id="character-display"></div>
    </div>

    <div class="action-grid" id="action-buttons">
      <button class="btn-feed" onclick="action('feed')"><span style="font-size:1.5rem">🍖</span>Tx手数料(エサ)</button>
      <button class="btn-play" onclick="action('play')"><span style="font-size:1.5rem">🎮</span>ハッシュ計算(遊ぶ)</button>
      <button class="btn-clean" onclick="action('clean')"><span style="font-size:1.5rem">🧹</span>メモリ解放(掃除)</button>
      <button class="btn-cure" onclick="action('cure')"><span style="font-size:1.5rem">💉</span>バグ修正(治療)</button>
      <button class="btn-full" onclick="openEvoModal()">🌟 特別進化の儀式 (命懸け)</button>
    </div>

    <div class="debug-panel">
      <button onclick="forceNextStage()" style="border-color:#ffd700; color:#ffd700;">⏩【UXTO】次へ</button>
      <button onclick="openGallery()" style="border-color:#fff; color:#fff;">📖 図鑑</button>
    </div>
  </main>

  <!-- 各種モーダル -->
  <div id="modal-evo" class="modal-overlay">
    <div class="modal-content">
      <h2 style="color:var(--danger)">⚠️ 特別進化の儀式</h2>
      <p style="font-size:0.8rem; color:#aaa;">伝説の姿になるための過酷な試練です。<br><strong style="color:var(--danger)">成功率は50%。失敗すると消滅します。</strong></p>
      <div id="evo-inputs">
        <div class="input-group">
          <label style="color:var(--primary);">🎮 ゲームヒーロー形態 (BITPUYO)</label>
          <input type="text" id="hero-code" placeholder="コード (デモ: BITPUYO2026)">
          <button onclick="startRitual('hero')" style="width:100%; margin-top:10px;">儀式を開始する</button>
        </div>
      </div>
      <div id="ritual-box">
        <h3 style="color:#fff; margin:0 0 10px 0;" id="ritual-msg">ハッシュ計算中...</h3>
        <div class="bar-bg" style="height:15px;"><div id="ritual-bar"></div></div>
      </div>
      <button onclick="closeModal('modal-evo')" class="btn-clean" style="width:100%; margin-top:15px;" id="close-evo-btn">やめておく</button>
    </div>
  </div>

  <div id="modal-gallery" class="modal-overlay">
    <div class="modal-content" style="max-width:600px; max-height:80vh;">
      <h2>📖 全キャラクター図鑑</h2>
      <div id="gallery-container" style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center;"></div>
      <button onclick="closeModal('modal-gallery')" class="btn-clean" style="width:100%; margin-top:15px;">閉じる</button>
    </div>
  </div>

  <div id="toast">メッセージ</div>

  <script>
    // ==========================================
    // 🎨 キャラクター画像設定 (ここをご自身の画像URLに差し替えます！)
    // テスト用に高画質なPokeAPIのアートワークURLを入れています。
    // ==========================================
    const POKE_URL = "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/";
    
    // 画像タグを生成する関数 (anim-floatでフワフワさせます)
    const IMG = (url, anim="anim-float") => `<img src="${url}" class="character-img ${anim}" alt="pet">`;

    const IMAGES = {
      // 卵 (トゲピーを仮配置)
      egg:   [IMG(`${POKE_URL}175.png`, "anim-pulse")], 
      // ひよこ・ベビー期 (ピチュー等)
      baby:  [IMG(`${POKE_URL}172.png`), IMG(`${POKE_URL}174.png`), IMG(`${POKE_URL}173.png`), IMG(`${POKE_URL}298.png`), IMG(`${POKE_URL}406.png`), IMG(`${POKE_URL}433.png`), IMG(`${POKE_URL}458.png`)],
      // 子供期 (ピカチュウ等)
      kid:   [IMG(`${POKE_URL}25.png`), IMG(`${POKE_URL}39.png`), IMG(`${POKE_URL}35.png`), IMG(`${POKE_URL}183.png`), IMG(`${POKE_URL}315.png`), IMG(`${POKE_URL}358.png`), IMG(`${POKE_URL}226.png`)],
      // 青年期 (ライチュウ等)
      teen:  [IMG(`${POKE_URL}26.png`), IMG(`${POKE_URL}40.png`), IMG(`${POKE_URL}36.png`), IMG(`${POKE_URL}184.png`), IMG(`${POKE_URL}407.png`), IMG(`${POKE_URL}359.png`), IMG(`${POKE_URL}227.png`)],
      // 成体期 (伝説のポケモン等)
      adult: [IMG(`${POKE_URL}150.png`), IMG(`${POKE_URL}249.png`), IMG(`${POKE_URL}250.png`), IMG(`${POKE_URL}383.png`), IMG(`${POKE_URL}382.png`), IMG(`${POKE_URL}384.png`), IMG(`${POKE_URL}483.png`)],
      // 特別進化: ヒーロー
      hero:  [IMG(`${POKE_URL}493.png`)], 
      // 特別進化: 富豪
      rich:  [IMG(`${POKE_URL}1000.png`)], 
      // 死亡 (ゴースト)
      dead:  [IMG(`${POKE_URL}93.png`, "")]
    };

    const STAGES = [
      { id: 'egg', name: '🥚 Genesis Egg', maxAge: 11 },
      { id: 'baby', name: '🐣 Satoshi Baby', maxAge: 71 },
      { id: 'kid', name: '🐥 Byte Kid', maxAge: 215 },
      { id: 'teen', name: '🐦 Hash Teen', maxAge: 431 },
      { id: 'adult', name: '👑 Node Master', maxAge: 719 }
    ];
    const LEGENDS = { 'hero': { id: 'hero', name: '⚡ Arcade Satoshi' }, 'rich': { id: 'rich', name: '🔥 Whale Leviathan' } };

    let state = { birthHeight: 0, hp: 100, mood: 100, txJunk: 0, isSick: false, lastAccess: Date.now(), specialEvo: null, titles: [], isDead: false, deathReason: "", variation: 0 };
    let currentTipHeight = 0;

    function loadData() { const d = localStorage.getItem('satoshi_egg_v3'); if(d) state = Object.assign(state, JSON.parse(d)); }
    function saveData() { localStorage.setItem('satoshi_egg_v3', JSON.stringify(state)); }

    async function updateNetwork() {
      if (state.isDead) return renderDead();
      try {
        const [tipRes, feeRes] = await Promise.all([fetch('https://mempool.space/api/blocks/tip/height'), fetch('https://mempool.space/api/v1/fees/recommended')]);
        currentTipHeight = parseInt(await tipRes.text());
        document.getElementById('mempool-status').innerText = `🌍 Block: ${currentTipHeight} | 🚀 Fee: ${await feeRes.json().then(f=>f.fastestFee)} sat/vB`;
        if(!state.birthHeight) { state.birthHeight = currentTipHeight; state.variation = Math.floor(Math.random()*7); saveData(); }
      } catch(e) {}
    }

    setInterval(() => {
      if(state.isDead || currentTipHeight === 0) return;
      const ms = Date.now() - state.lastAccess;
      const s = Math.floor((ms/1000)%60).toString().padStart(2,'0'), m = Math.floor((ms/60000)%60).toString().padStart(2,'0'), h = Math.floor(ms/3600000).toString().padStart(2,'0');
      document.getElementById('idle-time').innerText = `${h}:${m}:${s}`;

      const mult = state.isSick ? 2 : 1;
      let curHp = Math.max(0, state.hp - (ms/86400000) * 50 * mult);
      let curMood = Math.max(0, state.mood - (ms/43200000) * 50 * mult);

      if (Math.random() < 0.001 && state.txJunk < 5) {
        state.txJunk++; if (state.txJunk >= 3 && Math.random() < 0.3) state.isSick = true;
        saveData(); renderJunks();
      }

      if (curHp <= 0) { state.hp = 0; die("💀 餓死しました..."); return; }
      const age = currentTipHeight - state.birthHeight;
      if (age >= 1008) { die("👼 老衰 (天寿を全うしました)"); return; }

      document.getElementById('hp-text').innerText = `${Math.floor(curHp)}/100`; document.getElementById('hp-bar').style.width = `${curHp}%`;
      document.getElementById('mood-text').innerText = `${Math.floor(curMood)}/100`; document.getElementById('mood-bar').style.width = `${curMood}%`;
      document.getElementById('age-text').innerText = age;
      document.getElementById('sick-indicator').style.display = state.isSick ? 'block' : 'none';
      renderStage(age);
    }, 1000);

    function applyDrops() {
      const ms = Date.now() - state.lastAccess, mult = state.isSick ? 2 : 1;
      state.hp = Math.max(0, state.hp - (ms/86400000)*50*mult); state.mood = Math.max(0, state.mood - (ms/43200000)*50*mult);
      state.lastAccess = Date.now();
    }

    function action(type) {
      if(state.isDead) return;
      applyDrops();
      const chara = document.querySelector('.character-img');
      if(chara) { chara.classList.remove('anim-jump'); void chara.offsetWidth; chara.classList.add('anim-jump'); }

      if (type === 'feed') { state.hp = Math.min(100, state.hp + 20); showToast("🍖 HP回復！"); createParticles('❤️', '#ff4e50'); }
      else if (type === 'play') { if(state.isSick) { showToast("⚠️ 病気で遊べない！"); return; } state.mood = Math.min(100, state.mood + 30); showToast("🎮 ごきげんUP！"); createParticles('♪', '#ffd700'); }
      else if (type === 'clean') { if(state.txJunk===0) { showToast("🧹 綺麗です"); return; } state.txJunk = 0; showToast("🧹 メモリ解放完了！"); createParticles('✨', '#66fcf1'); renderJunks(); }
      else if (type === 'cure') { if(!state.isSick) { showToast("💉 健康です"); return; } state.isSick = false; showToast("💉 バグ修正完了！"); createParticles('💊', '#00f5d4'); document.getElementById('sick-indicator').style.display='none'; }
      saveData();
    }

    function createParticles(char, color) {
      const c = document.getElementById('character-container');
      for(let i=0; i<5; i++) {
        let p = document.createElement('div'); p.className = 'particle'; p.innerText = char; p.style.color = color;
        p.style.left = (40 + Math.random()*20) + '%'; p.style.top = (40 + Math.random()*20) + '%';
        p.style.animationDuration = (0.5 + Math.random()*0.5) + 's';
        c.appendChild(p); setTimeout(()=>p.remove(), 1000);
      }
    }

    function renderJunks() {
      const c = document.getElementById('junks-container'); c.innerHTML = '';
      for(let i=0; i<state.txJunk; i++) {
        let j = document.createElement('div'); j.className = 'junk-icon'; j.innerText = '💩'; // ゴミアイコン
        j.style.left = (10 + Math.random()*80) + '%'; j.style.top = (60 + Math.random()*30) + '%'; c.appendChild(j);
      }
    }

    let lastStageId = "";
    function renderStage(age) {
      let currentStage = STAGES[STAGES.length-1];
      if (age >= 720 && state.specialEvo) currentStage = LEGENDS[state.specialEvo];
      else { for (let s of STAGES) { if (age <= s.maxAge) { currentStage = s; break; } } }
      
      if (lastStageId !== currentStage.id && lastStageId !== "") { state.variation = Math.floor(Math.random()*7); saveData(); createParticles('🌟', '#fff'); }
      lastStageId = currentStage.id;

      document.getElementById('stage-text').innerText = currentStage.name;
      const imgArr = IMAGES[currentStage.id];
      const imgTag = imgArr[state.variation % imgArr.length];
      const disp = document.getElementById('character-display');
      if(disp.innerHTML !== imgTag) disp.innerHTML = imgTag;
    }

    function die(reason) { state.isDead = true; state.deathReason = reason; if (state.specialEvo) state.titles.push(`前世: ${LEGENDS[state.specialEvo].name}`); saveData(); renderDead(); }
    function renderDead() {
      document.getElementById('stage-text').innerText = state.deathReason; document.getElementById('character-display').innerHTML = IMAGES['dead'][0];
      document.getElementById('hp-bar').style.width = `0%`; document.getElementById('mood-bar').style.width = `0%`;
      document.getElementById('action-buttons').innerHTML = `<button class="btn-full" onclick="reincarnate()">♻️ 転生する (卵から)</button>`;
      document.getElementById('junks-container').innerHTML = ''; document.getElementById('sick-indicator').style.display='none';
    }
    function reincarnate() { state = { birthHeight: 0, hp: 100, mood: 100, txJunk: 0, isSick: false, lastAccess: Date.now(), specialEvo: null, titles: state.titles, isDead: false, deathReason: "", variation: 0 }; saveData(); location.reload(); }

    function openEvoModal() {
      const age = currentTipHeight - state.birthHeight;
      if(age < 432) { showToast("⚠️ まだ成体ではありません"); return; }
      if(state.specialEvo) { showToast("⚠️ 既に伝説です"); return; }
      document.getElementById('evo-inputs').style.display = 'block'; document.getElementById('ritual-box').style.display = 'none'; document.getElementById('modal-evo').style.display = 'flex';
    }
    function startRitual(type) {
      if(type === 'hero' && document.getElementById('hero-code').value !== 'BITPUYO2026') { showToast("❌ コードが違います"); return; }
      document.getElementById('evo-inputs').style.display = 'none'; document.getElementById('close-evo-btn').style.display = 'none';
      const rBox = document.getElementById('ritual-box'), rBar = document.getElementById('ritual-bar'), rMsg = document.getElementById('ritual-msg');
      rBox.style.display = 'block'; rBar.style.width = '0%'; rMsg.innerText = "ハッシュ計算中..."; rMsg.style.color = "#fff";

      let prog = 0;
      let intv = setInterval(() => {
        prog += Math.random() * 15;
        if(prog >= 100) {
          clearInterval(intv); rBar.style.width = '100%';
          if (Math.random() < 0.5) {
            rMsg.innerText = "🌟 儀式成功！！"; rMsg.style.color = "#ffd700";
            setTimeout(() => { state.specialEvo = type; state.birthHeight -= 720; saveData(); closeModal('modal-evo'); showToast("🌟 伝説の姿に進化した！"); lastStageId=""; }, 1500);
          } else {
            rMsg.innerText = "💥 オーバーヒート！"; rMsg.style.color = "#ff4e50";
            setTimeout(() => { closeModal('modal-evo'); die("💥 儀式の負荷に耐えきれず消滅した..."); }, 1500);
          }
        } else rBar.style.width = prog + '%';
      }, 300);
    }

    function forceNextStage() {
      if (state.isDead || currentTipHeight === 0) return;
      const age = currentTipHeight - state.birthHeight; let next = 0;
      if(age<12) next=12; else if(age<72) next=72; else if(age<216) next=216; else if(age<432) next=432;
      else { showToast("⚠️ これ以上は通常進化しません"); return; }
      state.birthHeight = currentTipHeight - next; saveData(); showToast("⏩ ブロック早送り");
    }

    function openGallery() {
      const c = document.getElementById('gallery-container'); c.innerHTML = '';
      const order = [{name:"Egg", arr:IMAGES.egg}, {name:"Baby", arr:IMAGES.baby}, {name:"Kid", arr:IMAGES.kid}, {name:"Teen", arr:IMAGES.teen}, {name:"Adult", arr:IMAGES.adult}, {name:"Hero", arr:IMAGES.hero}, {name:"Dead", arr:IMAGES.dead}];
      order.forEach(st => {
        st.arr.forEach((img, idx) => {
          let d = document.createElement('div'); d.style = "background:rgba(0,0,0,0.5); border:1px solid #333; padding:10px; border-radius:10px; width:90px; text-align:center;";
          d.innerHTML = `<div style="height:60px; display:flex; justify-content:center; align-items:center;">${img.replace('anim-float', '').replace('max-width: 180px', 'max-width: 60px; max-height: 60px')}</div><div style="font-size:0.6rem; color:#888; margin-top:5px;">${st.name} ${idx}</div>`;
          c.appendChild(d);
        });
      });
      document.getElementById('modal-gallery').style.display = 'flex';
    }

    function closeModal(id) { document.getElementById(id).style.display = 'none'; document.getElementById('close-evo-btn').style.display = 'block'; }
    function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 2000); }

    window.onload = () => { loadData(); updateNetwork(); renderJunks(); setInterval(updateNetwork, 60000); };
  </script>
</body>
</html>
